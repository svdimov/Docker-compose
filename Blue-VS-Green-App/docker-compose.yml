services:
  vote:
    build:
      context: ./vote
    ports:
      - "5000:80"
    depends_on:
      - redis
    volumes:
      - ./vote:/app
    networks:
      - frontend
      - backend

  result:
    build:
      context: ./result
    ports:
      - "5001:80"
    depends_on:
      - db
    volumes:
      - ./result:/app
    networks:
      - frontend
      - backend

  worker:
    build:
      context: ./worker
    depends_on:
      - redis
      - db
    networks:
      - backend

  redis:
    image: redis:latest
    networks:
      - backend

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
   
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - backend

volumes:
  db-data:

networks:
  frontend:
  backend: